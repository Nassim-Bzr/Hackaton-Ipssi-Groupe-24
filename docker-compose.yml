services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/raw;
      mc mb -p local/clean;
      mc mb -p local/curated;
      exit 0;
      "

  validations:
    build:
      context: ./validations
      dockerfile: Dockerfile
    container_name: validations
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  # Airflow : métadonnées en SQLite (fichier local), MongoDB reste la BDD applicative
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: airflow-local:2.10.1
    container_name: airflow-init
    environment:
      - AIRFLOW_UID=50000
      - AIRFLOW_GID=50000
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=
      - _PIP_ADDITIONAL_REQUIREMENTS=
    volumes:
      - ./airflow:/opt/airflow
    user: "50000:50000"
    command: >
      bash -c "
      airflow db init &&
      (airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@localhost --password admin || true)
      "
    depends_on:
      - mongodb
      - validations
      - minio
      - minio-init

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: airflow-local:2.10.1
    container_name: airflow
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW_UID=50000
      - AIRFLOW_GID=50000
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=False
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
      validations:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      backend:
        condition: service_started
    volumes:
      - ./airflow:/opt/airflow
    user: "50000:50000"
    # standalone = scheduler + webserver dans un seul conteneur (idéal avec SQLite)
    command: airflow standalone

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=hackathon
      - VALIDATION_SERVICE_URL=http://validations:8000/data-validation
      - DATA_LAKE_ENABLED=true
      - DATA_LAKE_ENDPOINT=minio:9000
      - DATA_LAKE_ACCESS_KEY=minioadmin
      - DATA_LAKE_SECRET_KEY=minioadmin
      - DATA_LAKE_SECURE=false
      - RAW_BUCKET=raw
      - CLEAN_BUCKET=clean
      - CURATED_BUCKET=curated
    depends_on:
      - mongodb
      - validations
      - minio
      - minio-init

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=200
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=200
      - VITE_HMR_CLIENT_PORT=5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mongo_data:
  minio_data:
  frontend_node_modules:
