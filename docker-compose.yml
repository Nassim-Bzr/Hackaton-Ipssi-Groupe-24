services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  validations:
    build:
      context: ./validations
      dockerfile: Dockerfile
    container_name: validations
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

volumes:
  mongo_data:
